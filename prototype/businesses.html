<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>会員企業一覧 | 新宮町商工会</title>
    <meta name="description" content="新宮町商工会の会員企業一覧。業種やキーワードで町内のお店・事業者を探せます。" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <link rel="stylesheet" href="./styles.css?v=20260707-tabs1" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="トップへ">
        <span class="brand-mark">新</span>
        <span>
          <strong>新宮町商工会</strong>
          <small>会員企業一覧</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="主要ナビゲーション">
        <a href="./index.html#features">特集</a>
        <a href="./index.html#interviews">インタビュー</a>
        <a href="./businesses.html">会員企業一覧</a>
        <a href="./index.html#news">お知らせ</a>
        <a class="nav-cta" href="./index.html#about">商工会とは</a>
      </nav>
    </header>

    <main>
      <section class="page-hero compact-page-hero">
        <p class="eyebrow">Business Directory</p>
        <h1>町内のお店・事業者を探す</h1>
        <p>暮らしや仕事で必要な地元の情報を、業種やキーワードからすぐに探せます。</p>
      </section>

      <section class="section businesses-section" aria-labelledby="business-list-title">
        <div class="section-heading split-heading">
          <div>
            <p class="eyebrow">Search</p>
            <h2 id="business-list-title">会員企業一覧</h2>
          </div>
          <p>企業名や業種、所在地、連絡先、ホームページ、SNSなどをまとめて確認できます。</p>
        </div>

        <div class="filters" aria-label="絞り込み条件">
          <label>
            業種
            <select id="category-filter">
              <option value="">すべて</option>
            </select>
          </label>
          <label>
            エリア
            <select id="area-filter">
              <option value="">すべて</option>
            </select>
          </label>
          <label class="wide-filter">
            キーワード
            <input id="keyword-filter" type="search" placeholder="企業名、業種、所在地、電話番号で検索" />
          </label>
        </div>
        <div class="filter-shortcuts" role="tablist" aria-label="業種で絞り込み">
          <span>業種で絞る</span>
          <button type="button" data-filter-category="" role="tab">すべて</button>
          <button type="button" data-filter-category="飲食" role="tab">飲食</button>
          <button type="button" data-filter-category="建設" role="tab">住まい・建設</button>
          <button type="button" data-filter-category="美容" role="tab">美容</button>
          <button type="button" data-filter-category="健康" role="tab">健康</button>
          <button type="button" data-filter-category="サービス" role="tab">サービス</button>
        </div>

        <div id="directory-ad-slot" class="directory-ad-slot" aria-label="おすすめの事業者"></div>

        <div class="list-status">
          <span id="result-count">0件</span>
          <button id="reset-filters" type="button">条件をクリア</button>
        </div>
        <div id="business-list" class="business-list directory-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>新宮町商工会｜まちの仕事と暮らし</p>
      <p><a href="./index.html">トップへ戻る</a></p>
    </footer>

    <script src="./data.js?v=20260706-copy1"></script>
    <script src="./app.js?v=20260707-tabs1"></script>
  </body>
</html>
